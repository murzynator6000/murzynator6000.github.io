<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Czy nadajesz się do marketingu?</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --ink: #1a1714;
      --paper: #f7f4ef;
      --cream: #ede9e1;
      --accent: #c8622a;
      --accent-light: #f0ddd0;
      --muted: #7a746b;
      --border: #d4cfc6;
      --card: #ffffff;
      --type-a: #3b5e7a;
      --type-b: #4a7c5e;
      --type-c: #8b4a6e;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Hero ── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 2rem;
      position: relative;
      background: var(--ink);
      overflow: hidden;
    }

    .hero-noise {
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.5;
      pointer-events: none;
    }

    .hero-deco {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }

    .hero-deco-1 {
      width: 400px;
      height: 400px;
      background: rgba(200, 98, 42, 0.18);
      top: -100px;
      right: -80px;
    }

    .hero-deco-2 {
      width: 300px;
      height: 300px;
      background: rgba(59, 94, 122, 0.15);
      bottom: -60px;
      left: -60px;
    }

    .hero-eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
      position: relative;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .hero-eyebrow::before,
    .hero-eyebrow::after {
      content: '';
      display: block;
      height: 1px;
      width: 40px;
      background: var(--accent);
      opacity: 0.6;
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(52px, 9vw, 110px);
      font-weight: 700;
      line-height: 0.92;
      color: var(--paper);
      margin-bottom: 0.4em;
      position: relative;
    }

    .hero-title em {
      font-style: italic;
      color: var(--accent);
    }

    .hero-subtitle {
      font-size: 16px;
      font-weight: 300;
      color: rgba(247, 244, 239, 0.6);
      max-width: 420px;
      line-height: 1.7;
      margin-bottom: 3rem;
      position: relative;
    }

    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--accent);
      color: white;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.04em;
      padding: 14px 32px;
      border-radius: 100px;
      transition: background 0.2s, transform 0.2s;
      position: relative;
      cursor: pointer;
      border: none;
    }

    .hero-cta:hover {
      background: #b55521;
      transform: translateY(-2px);
    }

    .hero-cta svg {
      transition: transform 0.2s;
    }

    .hero-cta:hover svg {
      transform: translateX(3px);
    }

    .hero-scroll-hint {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: rgba(247, 244, 239, 0.3);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateX(-50%) translateY(0);
      }

      50% {
        transform: translateX(-50%) translateY(6px);
      }
    }

    /* ── Quiz Section ── */
    #quiz-section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6rem 2rem;
      background: var(--paper);
    }

    .quiz-container {
      width: 100%;
      max-width: 900px;
    }

    .quiz-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 3rem;
    }

    .q-counter {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .progress-track {
      flex: 1;
      height: 2px;
      background: var(--border);
      margin: 0 1.5rem;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .q-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(22px, 4vw, 30px);
      font-weight: 400;
      line-height: 1.35;
      color: var(--ink);
      margin-bottom: 2.5rem;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .opt-btn {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 22px;
      text-align: left;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 400;
      color: var(--ink);
      display: flex;
      gap: 16px;
      align-items: flex-start;
      transition: border-color 0.15s, background 0.15s, transform 0.15s;
      line-height: 1.5;
    }

    .opt-btn:hover {
      border-color: var(--accent);
      background: #fdf8f5;
      transform: translateX(4px);
    }

    .opt-btn.selected {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .opt-key {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .opt-btn.selected .opt-key {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .quiz-nav {
      display: flex;
      justify-content: flex-end;
      margin-top: 2rem;
    }

    .next-btn {
      background: var(--ink);
      color: var(--paper);
      border: none;
      border-radius: 100px;
      padding: 13px 32px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.15s, opacity 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .next-btn:hover:not(:disabled) {
      background: #333;
      transform: translateY(-2px);
    }

    .next-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none;
    }

    /* ── Result ── */
    .result-wrap {
      width: 100%;
      max-width: 640px;
      animation: fadeUp 0.6s ease forwards;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .result-eyebrow {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .result-type-label {
      font-family: 'Playfair Display', serif;
      font-size: clamp(40px, 7vw, 64px);
      font-weight: 700;
      line-height: 1;
      margin-bottom: 1.5rem;
    }

    .type-a .result-type-label {
      color: var(--type-a);
    }

    .type-b .result-type-label {
      color: var(--type-b);
    }

    .type-c .result-type-label {
      color: var(--type-c);
    }

    .result-desc {
      font-size: 16px;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.75;
      max-width: 480px;
      margin-bottom: 3rem;
      border-left: 2px solid var(--border);
      padding-left: 1.25rem;
    }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 2.5rem;
    }

    .score-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      text-align: center;
    }

    .score-card.winner {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .sc-letter {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 4px;
    }

    .score-card.winner .sc-letter {
      color: var(--accent);
    }

    .sc-count {
      font-size: 13px;
      color: var(--muted);
    }

    .sc-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 10px;
      overflow: hidden;
    }

    .sc-bar-fill {
      height: 100%;
      background: var(--border);
      border-radius: 2px;
      transition: width 1s ease;
    }

    .score-card.winner .sc-bar-fill {
      background: var(--accent);
    }

    .restart-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 12px 28px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .restart-btn:hover {
      border-color: var(--ink);
      color: var(--ink);
    }

    /* ── Footer ── */
    footer {
      background: var(--ink);
      color: rgba(247, 244, 239, 0.3);
      text-align: center;
      padding: 2rem;
      font-size: 12px;
      letter-spacing: 0.05em;
    }

    /* Animations on load */
    .hero-eyebrow,
    .hero-title,
    .hero-subtitle,
    .hero-cta {
      opacity: 0;
      animation: fadeUp 0.7s ease forwards;
    }

    .hero-eyebrow {
      animation-delay: 0.1s;
    }

    .hero-title {
      animation-delay: 0.25s;
    }

    .hero-subtitle {
      animation-delay: 0.4s;
    }

    .hero-cta {
      animation-delay: 0.55s;
    }

    .hero-scroll-hint {
      animation-delay: 0.8s;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.8s forwards, bounce 2s ease-in-out 1.5s infinite;
    }

    @media (max-width: 1024px) {
      .hero-title {
        font-size: clamp(48px, 8vw, 84px);
      }
    }

    @media (max-width: 820px) {
      .hero {
        padding: 4rem 1.5rem;
      }

      #quiz-section {
        padding: 5rem 1.5rem;
      }

      .score-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .score-grid .score-card:last-child {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 480px) {
      .score-grid {
        grid-template-columns: 1fr;
      }

      .score-grid .score-card:last-child {
        grid-column: auto;
      }

      .hero {
        padding: 3rem 1.5rem;
      }

      #quiz-section {
        padding: 4rem 1.25rem;
      }
    }
  </style>
</head>

<body>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-noise"></div>
    <div class="hero-deco hero-deco-1"></div>
    <div class="hero-deco hero-deco-2"></div>
    <div class="hero-eyebrow">Quiz "Czy nadajesz się do marketingu?"</div>
    <h1 class="hero-title">Quiz <em>"Czy nadajesz się<br>do marketingu?"</em></h1>
    <p class="hero-subtitle">Sześć pytań. Trzy odpowiedzi. Odpowiedz szczerze.
    </p>
    <button class="hero-cta" onclick="document.getElementById('quiz-section').scrollIntoView({behavior:'smooth'})">
      Rozpocznij quiz
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3 8h10M9 4l4 4-4 4" stroke="white" stroke-width="1.5" stroke-linecap="round"
          stroke-linejoin="round" />
      </svg>
    </button>
    <div class="hero-scroll-hint">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 3v10M4 9l4 4 4-4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"
          stroke-linejoin="round" />
      </svg>
      scroll
    </div>
  </section>

  <!-- Quiz -->
  <section id="quiz-section">
    <div class="quiz-container" id="quiz-screen">
      <div class="quiz-header">
        <span class="q-counter" id="q-label">01 / 06</span>
        <div class="progress-track">
          <div class="progress-fill" id="prog" style="width:0%"></div>
        </div>
      </div>
      <div class="q-text" id="q-text"></div>
      <div class="options" id="options"></div>
      <div class="quiz-nav">
        <button class="next-btn" id="next-btn" disabled>
          Next
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </button>
      </div>
    </div>
    <div id="result-screen" style="display:none"></div>
  </section>

  <footer>© 2026 &nbsp;·&nbsp; Kacper Jarczewski 3TP, Adam Pułka 3TP</footer>

  <script>
    const questions = [
      {
        text: "Widzisz reklamę w internecie. Co robisz?",
        options: [
          { key: "A", text: "Ignoruję ją" },
          { key: "B", text: "Klikam, jeśli mnie zainteresuje" },
          { key: "C", text: "Analizuję, dlaczego mnie przyciągnęła" }
        ]
      },
      {
        text: "Twoje podejście do social mediów:",
        options: [
          { key: "A", text: "Tylko scrolluję" },
          { key: "B", text: "Czasem coś wrzucę" },
          { key: "C", text: "Lubię tworzyć posty, stories, rolki" }
        ]
      },
      {
        text: "Masz sprzedać produkt (np. kubek). Co robisz?",
        options: [
          { key: "A", text: "Mówię: „Kup, bo jest fajny" },
          { key: "B", text: "Wymieniam jego zalety" },
          { key: "C", text: "Tworzę historię i pokazuję, dlaczego ktoś go potrzebuje" }
        ]
      },
      {
        text: "Praca w grupie:",
        options: [
          { key: "A", text: "Wolę działać sam/a" },
          { key: "B", text: "Zależy od sytuacji" },
          { key: "C", text: "Lubię współpracę i burzę mózgów" }
        ]
      },
      {
        text: "Kreatywność:",
        options: [
          { key: "A", text: "Raczej nie moja mocna strona" },
          { key: "B", text: "Bywa różnie" },
          { key: "C", text: "Mam dużo pomysłów i lubię je realizować" }
        ]
      },
      {
        text: "Jak reagujesz na nowe trendy (np. viral na TikToku)?",
        options: [
          { key: "A", text: "Nie interesują mnie" },
          { key: "B", text: "Oglądam je dla rozrywki" },
          { key: "C", text: "Myślę, jak wykorzystać je w praktyce" }
        ]
      }
    ];

    const results = {
      A: { label: "Najwięcej A", typeClass: "type-a", desc: "Marketing to może nie być Twój pierwszy wybór, ale możesz się tego nauczyć!" },
      B: { label: "Najwięcej B", typeClass: "type-b", desc: "Masz potencjał – przy odrobinie praktyki możesz odnaleźć się w marketingu." },
      C: { label: "Najwięcej C", typeClass: "type-c", desc: "Masz marketingowy mindset! Kreatywność i analiza to Twoje supermoce – ten kierunek jest dla Ciebie!" }
    };

    let current = 0, answers = [], selected = null;

    function render() {
      const q = questions[current];
      document.getElementById("q-label").textContent = `0${current + 1} / 0${questions.length}`;
      document.getElementById("q-text").textContent = q.text;
      document.getElementById("prog").style.width = `${(current / questions.length) * 100}%`;
      const opts = document.getElementById("options");
      opts.innerHTML = "";
      q.options.forEach((o, i) => {
        const btn = document.createElement("button");
        btn.className = "opt-btn" + (selected === i ? " selected" : "");
        btn.innerHTML = `<span class="opt-key">${o.key}</span><span>${o.text}</span>`;
        btn.onclick = () => {
          selected = i;
          document.querySelectorAll(".opt-btn").forEach(b => b.classList.remove("selected"));
          btn.classList.add("selected");
          document.getElementById("next-btn").disabled = false;
        };
        opts.appendChild(btn);
      });
      const nb = document.getElementById("next-btn");
      nb.innerHTML = (current === questions.length - 1)
        ? 'Pokaż wyniki <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>'
        : 'Dalej <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      nb.disabled = selected === null;
    }

    document.getElementById("next-btn").onclick = () => {
      if (selected === null) return;
      answers.push(questions[current].options[selected].key);
      current++;
      selected = null;
      if (current < questions.length) { render(); }
      else { showResult(); }
    };

    function showResult() {
      document.getElementById("quiz-screen").style.display = "none";
      const counts = { A: 0, B: 0, C: 0 };
      answers.forEach(a => counts[a]++);
      const winner = Object.entries(counts).sort((x, y) => y[1] - x[1])[0][0];
      const r = results[winner];
      const total = answers.length;
      const rs = document.getElementById("result-screen");
      rs.innerHTML = `
    <div class="result-wrap ${r.typeClass}">
      <div class="result-eyebrow">Twój wynik</div>
      <div class="result-type-label">${r.label}</div>
      <p class="result-desc">${r.desc}</p>
      <div class="score-grid">
        ${['A', 'B', 'C'].map(k => `
          <div class="score-card ${k === winner ? 'winner' : ''}">
            <div class="sc-letter">${k}</div>
            <div class="sc-count">${counts[k]} of ${total}</div>
            <div class="sc-bar"><div class="sc-bar-fill" style="width:${Math.round(counts[k] / total * 100)}%"></div></div>
          </div>
        `).join('')}
      </div>
      
    </div>
  `;
      rs.style.display = "flex";
      rs.style.justifyContent = "center";
    }

    function restart() {
      current = 0; answers = []; selected = null;
      document.getElementById("result-screen").style.display = "none";
      document.getElementById("result-screen").innerHTML = "";
      document.getElementById("quiz-screen").style.display = "block";
      render();
      document.getElementById("quiz-section").scrollIntoView({ behavior: "smooth" });
    }

    render();
  </script>
</body>

</html>
